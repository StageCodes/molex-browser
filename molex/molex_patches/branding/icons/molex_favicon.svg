<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Molex favicon (simplified mole head) -->
  <circle cx="24" cy="24" r="22" fill="#6750C4"/>
  <!-- Snout -->
  <ellipse cx="24" cy="27" rx="10" ry="8" fill="#4F378A"/>
  <!-- Nose -->
  <ellipse cx="24" cy="25" rx="4" ry="3" fill="#FFB4A8"/>
  <!-- Eyes -->
  <circle cx="18" cy="19" r="3" fill="#1D1B20"/>
  <circle cx="30" cy="19" r="3" fill="#1D1B20"/>
  <!-- Eye shine -->
  <circle cx="19" cy="18" r="1" fill="white" opacity="0.8"/>
  <circle cx="31" cy="18" r="1" fill="white" opacity="0.8"/>
  <!-- Whiskers -->
  <line x1="14" y1="25" x2="4" y2="23" stroke="#4F378A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="27" x2="4" y2="28" stroke="#4F378A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="25" x2="44" y2="23" stroke="#4F378A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="27" x2="44" y2="28" stroke="#4F378A" stroke-width="1.5" stroke-linecap="round"/>
</svg>

name: Build Molex (Linux)

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android /usr/share/swift /usr/local/share/powershell
          sudo rm -rf /opt/microsoft /usr/share/miniconda /usr/local/julia* /opt/pipx
          du -sh / 2>/dev/null || true
          df -h /

      - name: Setup depot_tools
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Cache upstream source
        uses: actions/cache@v4
        with:
          path: mol/
          key: mol-src-${{ runner.os }}-${{ hashFiles('molex/molex_patches/**') }}
          restore-keys: |
            mol-src-${{ runner.os }}-

      - name: Fetch upstream
        run: |
          if [ -d mol/src/.git ] && [ -f mol/src/BUILD.gn ]; then
            cd mol/src
            gclient sync --nohooks --no-history
          else
            rm -rf mol
            mkdir -p mol
            cd mol
            fetch --nohooks --no-history chromium
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get install -y -qq ccache 2>/dev/null || true
          cd mol/src
          sudo ./build/install-build-deps.sh --no-prompt --no-arm
          gclient runhooks

      - name: Apply Molex patches
        run: |
          bash molex/build/apply_patches.sh "$PWD/mol/src"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-lin-${{ hashFiles('molex/molex_patches/**') }}-${{ github.sha }}
          restore-keys: |
            ccache-lin-${{ hashFiles('molex/molex_patches/**') }}-
            ccache-lin-

      - name: Configure ccache
        run: |
          ccache -M 6G
          ccache -o compression=true
          ccache -o compression_level=6
          ccache -o sloppiness=time_macros,include_file_mtime,include_file_ctime
          ccache -o cache_dir=$HOME/.ccache
          ccache -z

      - name: Generate GN project
        run: |
          cd mol/src
          gn gen out/molex --args='
            is_official_build=false
            is_debug=false
            symbol_level=0
            blink_symbol_level=0
            optimize_for_size=true
            cc_wrapper="ccache"
            proprietary_codecs=true
            chrome_pgo_phase=0
            ffmpeg_branding="Chrome"
            enable_widevine=true
            branding="molex"
          '

      - name: Build Molex
        run: |
          cd mol/src
          ninja -C out/molex chrome

      - name: Show ccache stats
        if: always()
        run: ccache -sv

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: molex-linux-amd64
          path: mol/src/out/molex/chrome
          retention-days: 30

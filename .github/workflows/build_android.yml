name: Build Molex (Android)

"on":
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
          df -h /

      - name: Setup depot_tools
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Cache upstream source
        uses: actions/cache@v4
        with:
          path: mol/
          key: mol-android-src-${{ runner.os }}-${{ hashFiles('molex/molex_patches/**') }}

      - name: Fetch upstream (Android)
        run: |
          if [ -d mol/src/.git ] && [ -f mol/src/build/install-build-deps-android.sh ]; then
            cd mol/src
            gclient sync
          else
            rm -rf mol
            mkdir -p mol
            cd mol
            fetch --nohooks --no-history android
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk zip unzip libgl1-mesa-dev 2>/dev/null
          if [ -f mol/src/build/install-build-deps-android.sh ]; then
            cd mol/src && sudo ./build/install-build-deps-android.sh --no-prompt
          else
            echo "Warning: install-build-deps-android.sh not found, installing manually"
            sudo apt-get install -y -qq libc6:i386 libncurses5:i386 libstdc++6:i386 2>/dev/null || true
          fi
          cd mol/src && gclient runhooks

      - name: Apply Molex patches
        run: |
          bash molex/build/apply_patches.sh "$PWD/mol/src"

      - name: Build Molex APK
        run: |
          cd mol/src
          gn gen out/molex-android --args='
            is_official_build=false
            is_debug=false
            symbol_level=0
            blink_symbol_level=0
            optimize_for_size=true
            target_os="android"
            target_cpu="arm64"
            toolkit_views=true
            proprietary_codecs=true
            chrome_pgo_phase=0
            ffmpeg_branding="Chrome"
            enable_widevine=true
            branding="molex"
          '
          ninja -C out/molex-android chrome_public_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: molex-android-arm64
          path: mol/src/out/molex-android/apks/MolexBrowser.apk
          retention-days: 30
